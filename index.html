<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songify AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

button {
    cursor: pointer;
}

.msg {
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
}

.ai { background: #1e1e1e; border-left: 3px solid #1DB954; }
.user { background: #2a2a2a; text-align: right; }

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #2a2a2a;
    border: none;
    color: white;
}

.send {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: #1DB954;
    border: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Songify AI 🎧</h2>

<button id="login">Login with Spotify</button>

<div id="chat"></div>

<input id="input" disabled placeholder="Search songs or type 'create playlist'">
<button class="send" id="send" disabled>Send</button>

</div>

<script>

const backend = "https://sai-be.onrender.com";

let token = null;
let tracks = [];

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");
const login = document.getElementById("login");

/* ---------------- LOGIN ---------------- */
login.onclick = () => {
    window.location.href = `${backend}/login`;
};

/* ---------------- HANDLE REDIRECT ---------------- */
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const t = params.get("access_token");

    if (t) {
        token = t;

        login.textContent = "Connected 🎧";

        input.disabled = false;
        send.disabled = false;

        addMsg("System", "Spotify connected 🎧", "ai");

        // FIX: prevent GitHub 404 issues
        window.history.replaceState({}, document.title, "/Songify-Ai/");
    }
};

/* ---------------- SEND ---------------- */
send.onclick = handle;

async function handle() {
    const text = input.value.trim();
    if (!text) return;

    addMsg("You", text, "user");
    input.value = "";

    if (text.includes("create playlist")) {
        return createPlaylist();
    }

    search(text);
}

/* ---------------- SEARCH ---------------- */
async function search(q) {
    const res = await fetch(`${backend}/search?q=${q}`, {
        headers: {
            Authorization: `Bearer ${token}`
        }
    });

    const data = await res.json();

    data.tracks.items.forEach(t => {
        const div = document.createElement("div");
        div.className = "msg ai";
        div.innerHTML = `
            🎵 ${t.name} - ${t.artists[0].name}
            <br><button onclick="add('${t.uri}')">Add</button>
        `;
        chat.appendChild(div);
    });
}

/* ---------------- ADD TRACK ---------------- */
window.add = (uri) => {
    if (!tracks.includes(uri)) tracks.push(uri);
    addMsg("System", "Added track 🎧", "ai");
};

/* ---------------- CREATE PLAYLIST ---------------- */
async function createPlaylist() {
    const res = await fetch(`${backend}/create-playlist`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ tracks })
    });

    const data = await res.json();

    addMsg("AI", "Playlist created 🎶 " + data.external_url, "ai");

    tracks = [];
}

/* ---------------- UI ---------------- */
function addMsg(sender, text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chat.appendChild(div);
}

</script>

</body>
</html>
