<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songify AI Dashboard</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg-color: #121212;
            --card-bg: #181818;
            --chat-input-bg: #242424;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            height: 600px;
            border: 1px solid #282828;
        }

        .app-header {
            padding: 16px;
            border-bottom: 1px solid #282828;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-title {
            font-size: 18px;
            font-weight: bold;
        }

        .btn-auth {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
        }

        .chat-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.4;
        }

        .msg-user {
            background-color: #282828;
            color: var(--text-main);
            align-self: flex-end;
        }

        .msg-ai {
            background-color: #2e2e2e;
            color: var(--text-main);
            align-self: flex-start;
            border-left: 3px solid var(--spotify-green);
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid #282828;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background-color: var(--chat-input-bg);
            border: 1px solid #3e3e3e;
            border-radius: 4px;
            padding: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--text-sub);
        }

        .btn-send {
            background-color: var(--spotify-green);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <div class="app-title">Songify AI</div>
            <button id="auth-btn" class="btn-auth">Link Spotify</button>
        </div>

        <div id="chat-box" class="chat-area">
            <div class="msg msg-ai">
                Hey! Link your Spotify account above, then tell me what playlists you want me to build or edit.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" class="chat-input" placeholder="Ask Gemini to create or update playlists..." disabled>
            <button id="send-btn" class="btn-send" disabled>Send</button>
        </div>
    </div>

    <script>
        const authBtn = document.getElementById('auth-btn');
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let spotifyConnected = false;

        authBtn.addEventListener('click', () => {
            if (!spotifyConnected) {
                spotifyConnected = true;
                authBtn.textContent = 'Connected';
                authBtn.style.backgroundColor = '#282828';
                authBtn.style.color = '#b3b3b3';
                
                userInput.removeAttribute('disabled');
                sendBtn.removeAttribute('disabled');
                userInput.focus();

                appendMessage("System", "Spotify account successfully linked.", "ai");
            }
        });

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage("You", text, "user");
            userInput.value = '';

            // Mocking the AI pipeline response for structural evaluation
            setTimeout(() => {
                appendMessage("Songify AI", `[Mock Action] I will create a new playlist based on your prompt and parse tracks via Spotify.`, "ai");
            }, 800);
        }

        function appendMessage(sender, text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', `msg-${type}`);
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
