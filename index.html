<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songify AI</title>

<style>
:root {
    --spotify-green: #1DB954;
    --bg-color: #121212;
    --card-bg: #181818;
    --text-main: #ffffff;
    --text-sub: #b3b3b3;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: var(--bg-color);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.app-container {
    width: 480px;
    height: 650px;
    background: var(--card-bg);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    border: 1px solid #2a2a2a;
}

.app-header {
    padding: 14px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a2a;
}

.btn-auth {
    background: white;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
}

.chat-area {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
}

.msg-user {
    background: #2a2a2a;
    align-self: flex-end;
}

.msg-ai {
    background: #202020;
    border-left: 3px solid var(--spotify-green);
}

.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #2a2a2a;
    gap: 8px;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #2a2a2a;
    color: white;
    outline: none;
}

button.send {
    background: var(--spotify-green);
    border: none;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="app-container">

    <div class="app-header">
        <div>Songify AI</div>
        <button id="auth-btn" class="btn-auth">Link Spotify</button>
    </div>

    <div id="chat" class="chat-area">
        <div class="msg msg-ai">
            Link Spotify to start searching and building playlists 🎧
        </div>
    </div>

    <div class="input-area">
        <input id="input" placeholder="Search songs or type 'create playlist'" disabled />
        <button id="send" class="send" disabled>Send</button>
    </div>

</div>

<script>
const backendURL = "https://sai-be.onrender.com";

const authBtn = document.getElementById("auth-btn");
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

let token = null;
let selectedTracks = [];

/* ---------------- LOGIN ---------------- */
authBtn.onclick = () => {
    window.location.href = `${backendURL}/login`;
};

/* ---------------- HANDLE CALLBACK TOKEN ---------------- */
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const t = params.get("access_token");

    if (t) {
        token = t;

        authBtn.textContent = "Connected";
        authBtn.style.background = "#2a2a2a";
        authBtn.style.color = "#b3b3b3";

        input.disabled = false;
        send.disabled = false;

        addMsg("System", "Spotify connected 🎧", "ai");

        window.history.replaceState({}, document.title, "/");
    }
};

/* ---------------- SEND ---------------- */
send.onclick = handleSend;
input.addEventListener("keypress", e => {
    if (e.key === "Enter") handleSend();
});

async function handleSend() {
    const text = input.value.trim();
    if (!text) return;

    addMsg("You", text, "user");
    input.value = "";

    if (text.toLowerCase().includes("create playlist")) {
        return createPlaylist();
    }

    searchSongs(text);
}

/* ---------------- SEARCH ---------------- */
async function searchSongs(q) {
    const res = await fetch(`${backendURL}/search?q=${encodeURIComponent(q)}`, {
        headers: {
            Authorization: `Bearer ${token}`
        }
    });

    const data = await res.json();

    if (!data.tracks?.items) {
        addMsg("AI", "No results found 😭", "ai");
        return;
    }

    data.tracks.items.forEach(track => {
        const div = document.createElement("div");
        div.className = "msg msg-ai";

        div.innerHTML = `
            🎵 <b>${track.name}</b><br>
            ${track.artists[0].name}<br>
            <button onclick="addTrack('${track.uri}')">➕ Add</button>
        `;

        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

/* ---------------- ADD TRACK ---------------- */
window.addTrack = function(uri) {
    if (!selectedTracks.includes(uri)) {
        selectedTracks.push(uri);
        addMsg("System", "Track added 🎧", "ai");
    }
};

/* ---------------- CREATE PLAYLIST ---------------- */
async function createPlaylist() {
    if (selectedTracks.length === 0) {
        addMsg("AI", "No tracks selected 😭", "ai");
        return;
    }

    const res = await fetch(`${backendURL}/create-playlist`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ tracks: selectedTracks })
    });

    const data = await res.json();

    addMsg("AI", `Playlist created 🎶 ${data.external_url}`, "ai");

    selectedTracks = [];
}

/* ---------------- UI ---------------- */
function addMsg(sender, text, type) {
    const div = document.createElement("div");
    div.className = `msg msg-${type}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
